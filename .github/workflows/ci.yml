name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  #  SFU service: typecheck 
  sfu-typecheck:
    name: SFU -- TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/sfu
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/sfu/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

  #  Frontend: typecheck + build 
  frontend-typecheck:
    name: Frontend -- TypeScript + Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

  #  Docker image: SFU 
  docker-sfu:
    name: Docker -- SFU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: sfu-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SFU image (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/sfu
          push: false
          tags: leeway-sfu:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
