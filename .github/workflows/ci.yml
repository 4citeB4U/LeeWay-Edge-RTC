name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  # ─── SFU service: typecheck + lint ──────────────────────────────────────────
  sfu-typecheck:
    name: SFU – TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/sfu
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/sfu/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

  # ─── Web demo: typecheck ─────────────────────────────────────────────────────
  web-demo-typecheck:
    name: Web demo – TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/web-demo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/web-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ─── Docker image: SFU ───────────────────────────────────────────────────────
  docker-sfu:
    name: Docker – SFU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: sfu-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SFU image (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/sfu
          push: false
          tags: leeway-sfu:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Docker image: web demo ───────────────────────────────────────────────────
  docker-web-demo:
    name: Docker – web demo image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: web-demo-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web demo image (no push)
        uses: docker/build-push-action@v6
        with:
          context: clients/web-demo
          push: false
          tags: leeway-web-demo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
