name: Deploy — Fly.io SFU

on:
  push:
    branches: [main, master]
    paths:
      - 'services/sfu/**'
      - '.github/workflows/deploy-fly.yml'

jobs:
  deploy:
    name: Deploy SFU to Fly.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # FLY_API_TOKEN must be set as a GitHub Actions secret:
        #   fly tokens create deploy -x 999999h   (on your machine)
        #   Then: Settings → Secrets → Actions → New secret → FLY_API_TOKEN
        run: flyctl deploy --config services/sfu/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
