name: Deploy Web Demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'clients/web-demo/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web-demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/web-demo/package-lock.json

      - name: Install dependencies
        working-directory: clients/web-demo
        run: npm ci

      - name: Build
        working-directory: clients/web-demo
        env:
          VITE_BASE_URL: /LeeWay-Edge-RTC/
          VITE_HTTP_BASE_URL: https://leeway-sfu.fly.dev
          VITE_SIGNALING_URL: wss://leeway-sfu.fly.dev/ws
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: clients/web-demo/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
