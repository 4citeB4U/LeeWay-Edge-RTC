name: Deploy — GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'LeeWay-Edge_RTC.tsx'
      - 'index.html'
      - 'vite.config.ts'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Vite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Hardcoded to match https://4citeb4u.github.io/LeeWay-Edge-RTC/
          VITE_BASE_URL: /LeeWay-Edge-RTC/
          # SFU connection — set VITE_SFU_URL_HOST as a GitHub Actions secret
          VITE_SIGNALING_URL: ${{ secrets.VITE_SFU_URL_HOST && format('wss://{0}/ws', secrets.VITE_SFU_URL_HOST) || '' }}
          VITE_HTTP_BASE_URL: ${{ secrets.VITE_SFU_URL_HOST && format('https://{0}', secrets.VITE_SFU_URL_HOST) || '' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
