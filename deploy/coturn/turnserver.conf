# ──────────────────────────────────────────────────────────────────────────────
# coturn configuration template for LeeWay Edge RTC
# Copy to /etc/coturn/turnserver.conf and replace all <PLACEHOLDER> values.
# ──────────────────────────────────────────────────────────────────────────────

# Listening port (STUN/TURN)
listening-port=3478

# TLS port (recommended for production)
tls-listening-port=5349

# Replace with your public IP address
external-ip=<YOUR_PUBLIC_IP>

# Realm – must match TURN_REALM in the SFU env
realm=leeway.local

# Shared-secret mechanism (time-limited credentials)
# Generate per-user credentials in your auth service:
#   username = unix_timestamp + ":" + username
#   password = HMAC-SHA1(shared_secret, username) | base64
use-auth-secret
static-auth-secret=change_me_turn_secret

# Limit relay to audio/video UDP/TCP ports (optional but recommended)
min-port=49160
max-port=65535

# TLS certificates (Let's Encrypt or self-signed)
# cert=/etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem
# pkey=/etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem

# Log file
log-file=/var/log/coturn/turn.log

# Disable deprecated CLI passwords
no-cli

# Drop cleartext STUN (enforce TLS; comment out for dev/local)
# no-udp
# no-tcp
