# ──────────────────────────────────────────────────────────────────────────────
# Production override for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────────────────────
# NOTE: The frontend (LeeWay Edge RTC dashboard) is deployed as a static site
# on GitHub Pages.  This compose file runs the SFU + TURN relay only.
# For Fly.io, use:  flyctl deploy --config services/sfu/fly.toml

services:
  sfu:
    image: ghcr.io/4citeb4u/leeway-sfu:latest   # use published image
    restart: always
    env_file:
      - /etc/leeway/sfu.env       # mount secret env from host
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    ports:
      - "3000:3000"
      - "40000-40099:40000-40099/udp"

  coturn:
    restart: always
    volumes:
      - /etc/leeway/turnserver.conf:/etc/coturn/turnserver.conf:ro
